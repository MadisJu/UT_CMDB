name: CI

on:
  push:
    branches: [ prod ]
  pull_request:
    branches: [ prod ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: |
          pytest tests/ --maxfail=5 --disable-warnings

  build-and-run:
    needs: test
    if: github.event_name == 'push'
    runs-on: [self-hosted, linux]
    environment: bulidenv
  
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system Python 3.12 (for runtime/venv)
        run: |
          sudo apt-get update
          sudo apt-get install -y python3.12 python3.12-venv

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
  
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
  
      - name: Create configs directory
        run: |
          mkdir -p src/core/configs

      - name: Debug Jira secrets lengths
        run: |
          echo "JIRA_URL len=${#JIRA_URL}"
          echo "JIRA_USER_EMAIL len=${#JIRA_USER_EMAIL}"
          echo "JIRA_API_TOKEN len=${#JIRA_API_TOKEN}"
          echo "JIRA_ASSET_WORKSPACE_ID len=${#JIRA_ASSET_WORKSPACE_ID}"
          echo "JIRA_CLOUD_ID len=${#JIRA_CLOUD_ID}"
        env:
          JIRA_URL: ${{ secrets.JIRA_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_ASSET_WORKSPACE_ID: ${{ secrets.JIRA_ASSET_WORKSPACE_ID }}
          JIRA_CLOUD_ID: ${{ secrets.JIRA_CLOUD_ID }}
          
      - name: Create .env file
        run: |
          cat > src/core/configs/.env << 'EOF'
          ENV=${{ secrets.ENV }}
  
          DATABASE_URL=${{ secrets.DATABASE_URL }}
  
          CELERY_BROKER_URL=${{ secrets.CELERY_BROKER_URL }}
          CELERY_RESULT_BACKEND=${{ secrets.CELERY_RESULT_BACKEND }}
  
          JIRA_URL=${{ secrets.JIRA_URL }}
          JIRA_API_TOKEN=${{ secrets.JIRA_API_TOKEN }}
          JIRA_USER_EMAIL=${{ secrets.JIRA_USER_EMAIL }}
          JIRA_ASSET_WORKSPACE_ID=${{ secrets.JIRA_ASSET_WORKSPACE_ID }}
          JIRA_CLOUD_ID=${{ secrets.JIRA_CLOUD_ID }}
  
          ANSIBLE_INVENTORY_PATH=src/core/configs/inventory.ini
          ANSIBLE_PLAYBOOK_PATH=playbooks/discovery.yml
          ANSIBLE_TIMEOUT=300
  
          DISCOVERY_INTERVAL_HOURS=${{ secrets.DISCOVERY_INTERVAL_HOURS }}
          SYNC_INTERVAL_MINUTES=${{ secrets.SYNC_INTERVAL_MINUTES }}
  
          LOG_LEVEL=${{ secrets.LOG_LEVEL }}
  
          ENABLE_PLUGINS=${{ secrets.ENABLE_PLUGINS }}
          ENABLE_JIRA_SYNC=${{ secrets.ENABLE_JIRA_SYNC }}
          ENABLE_ANSIBLE_DISCOVERY=${{ secrets.ENABLE_ANSIBLE_DISCOVERY }}
  
          CMDB_HOST=${{ secrets.CMDB_HOST }}
          CMDB_USER=${{ secrets.CMDB_USER }}
          CMDB_INTERVAL_SECONDS=${{ secrets.CMDB_INTERVAL_SECONDS }}
          EOF

      - name: Build wheelhouse
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Install from wheelhouse
        run: |
          chmod +x install.sh
          ./install.sh ./wheelhouse
  
      - name: Install and start UT CMDB service
        run: |
          cat <<'EOF' | sudo tee /etc/systemd/system/utcmdb.service
          [Unit]
          Description=UT CMDB (start.sh)
          After=network.target
          
          [Service]
          Type=simple
          User=ubuntu
          WorkingDirectory=/home/ubuntu/actions-runner/_work/UT_CMDB/UT_CMDB
          EnvironmentFile=/home/ubuntu/actions-runner/_work/UT_CMDB/UT_CMDB/src/core/configs/.env
          ExecStart=/bin/bash /home/ubuntu/actions-runner/_work/UT_CMDB/UT_CMDB/start.sh
          Restart=on-failure
          RestartSec=5
          
          [Install]
          WantedBy=multi-user.target
          EOF
      
          sudo systemctl daemon-reload
          sudo systemctl enable utcmdb.service
          sudo systemctl restart utcmdb.service
          sudo systemctl status utcmdb.service --no-pager --full

